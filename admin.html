<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка курса</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head>
<body data-page="admin">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__top">
        <h1>Админка курса</h1>
        <p id="adminCourseLabel">Загрузка...</p>
      </div>

      <button id="addLessonBtn" class="btn btn-primary" type="button">+ Добавить урок</button>

      <div id="lessonsList" class="admin-lessons-list"></div>
    </aside>

    <main class="admin-main">
      <div id="editorEmpty" class="admin-empty">
        Выберите урок слева
      </div>

      <div id="editorPanel" hidden>
        <div class="admin-editor-header">
          <h2 id="editorLessonTitle">Урок</h2>
          <button id="saveLessonBtn" class="btn btn-primary" type="button">Сохранить</button>
        </div>

        <div class="admin-form">
          <label>
            Lesson ID
            <input id="lessonIdInput" type="text" />
          </label>

          <label>
            День
            <input id="dayNumberInput" type="number" />
          </label>

          <label>
            Заголовок
            <input id="titleInput" type="text" />
          </label>

          <label>
            Подзаголовок
            <input id="subtitleInput" type="text" />
          </label>
        </div>

        <hr />

        <div class="admin-blocks-header">
          <h3>Блоки урока</h3>
          <button id="addBlockBtn" class="btn btn-primary" type="button">+ Добавить блок</button>
        </div>

        <div class="admin-rich-editor" id="richEditorWrap" hidden>
          <h3>Редактор блока</h3>
          <div id="quillEditor" style="height: 260px; background: #fff; color: #111;"></div>
          <div class="admin-block-video">
            <label for="videoIdInput">ID видео Kinescope</label>
            <input id="videoIdInput" type="text" placeholder="Например: 5qYpGTvDTbrLMBeBL6hpN1" />
            <p class="admin-hint">Полная ссылка соберётся автоматически: https://kinescope.io/embed/{ID}</p>
          </div>
          <div style="margin-top: 12px;">
            <button id="saveRichBlockBtn" class="btn btn-primary" type="button">Сохранить из редактора</button>
          </div>
          <div class="admin-block-items">
            <h3>Элементы блока</h3>
            <div class="admin-block-items-actions">
              <button id="addTextItemBtn" class="btn btn-primary" type="button">+ Текст</button>
              <button id="addVideoItemBtn" class="btn btn-primary" type="button">+ Видео</button>
              <button id="addFileItemBtn" class="btn btn-primary" type="button">+ Файл</button>
            </div>
            <div id="blockItemsList" class="admin-block-items-list"></div>
          </div>
        </div>

        <div id="blocksList" class="admin-blocks-list"></div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
