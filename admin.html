<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка курса</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head>
<body data-page="admin">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__top">
        <h1>Админка курса</h1>
        <p id="adminCourseLabel">Загрузка...</p>
      </div>

      <button id="addLessonBtn" class="btn btn-primary admin-sidebar__add-lesson" type="button">+ Новый урок</button>

      <div id="lessonsList" class="admin-lessons-list"></div>
    </aside>

    <main class="admin-main">
      <div id="editorEmpty" class="admin-empty">Выберите урок слева</div>

      <div id="editorPanel" hidden>
        <section class="admin-card admin-lesson-card">
          <div class="admin-card__header">
            <div>
              <p class="admin-card__eyebrow">Редактор урока</p>
              <h2 id="editorLessonTitle">Урок</h2>
            </div>
            <button id="saveLessonBtn" class="btn btn-primary" type="button">Сохранить урок</button>
          </div>

          <div class="admin-form admin-form--lesson">
            <label>
              Название урока
              <input id="titleInput" type="text" placeholder="Введите название урока" />
            </label>

            <label>
              Подзаголовок
              <input id="subtitleInput" type="text" placeholder="Введите подзаголовок" />
            </label>

            <label>
              Номер дня
              <input id="dayNumberInput" type="number" min="1" placeholder="Например, 7" />
            </label>
          </div>

          <details class="admin-advanced">
            <summary>Дополнительные поля</summary>
            <label>
              Внутренний lesson_id
              <input id="lessonIdInput" type="text" placeholder="Внутренний lesson_id" />
            </label>
          </details>
        </section>

        <section class="admin-blocks">
          <div class="admin-blocks-header">
            <h3>Секции урока</h3>
            <button id="addBlockBtn" class="btn btn-primary" type="button">+ Добавить секцию</button>
          </div>

          <div id="blocksList" class="admin-blocks-list"></div>
        </section>

        <section id="sectionEditorPanel" class="admin-section-editor" hidden>
          <div class="admin-section-editor__head">
            <div>
              <p class="admin-card__eyebrow">Панель секции</p>
              <h4>Редактирование секции</h4>
            </div>
            <button id="closeSectionEditorBtn" class="admin-btn-ghost" type="button">Закрыть</button>
          </div>

          <div class="admin-tabs">
            <button class="admin-tab-btn" type="button" data-section-tab="text">Текст</button>
            <button class="admin-tab-btn" type="button" data-section-tab="video">Видео</button>
            <button class="admin-tab-btn" type="button" data-section-tab="file">Файлы</button>
          </div>

          <div id="sectionEditorContent"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
