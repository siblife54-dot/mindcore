<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка курса</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head>
<body data-page="admin">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__top">
        <h1>Админка курса</h1>
        <p id="adminCourseLabel">Загрузка...</p>
      </div>

      <button id="addLessonBtn" class="btn btn-primary admin-sidebar__add-lesson" type="button">+ Новый урок</button>

      <div id="lessonsList" class="admin-lessons-list"></div>
    </aside>

    <main class="admin-main">
      <div id="editorEmpty" class="admin-empty">Выберите урок слева</div>

      <div id="editorPanel" class="admin-builder" hidden>
        <section class="admin-builder__center">
          <section class="admin-card admin-lesson-card">
            <div class="admin-card__header">
              <div>
                <p class="admin-card__eyebrow">Редактор урока</p>
                <h2 id="editorLessonTitle">Урок</h2>
              </div>
              <button id="saveLessonBtn" class="btn btn-primary" type="button">Сохранить урок</button>
            </div>

            <div class="admin-form admin-form--lesson">
              <label>
                Название урока
                <input id="titleInput" type="text" placeholder="Введите название урока" />
              </label>

              <label>
                Подзаголовок
                <input id="subtitleInput" type="text" placeholder="Введите подзаголовок" />
              </label>

              <label>
                Порядковый номер
                <input id="dayNumberInput" type="number" min="1" placeholder="Например, 7" />
              </label>

              <label>
                Метка урока
                <input id="lessonLabelInput" type="text" placeholder="Например: День 1, Урок 3, Модуль 2, Бонус" />
                <span class="admin-hint">Метка отображается ученику. Порядковый номер отвечает за сортировку и открытие уроков.</span>
              </label>
            </div>

            <section class="admin-lesson-preview-uploader">
              <div class="admin-lesson-preview-uploader__header">
                <h3>Превью урока</h3>
              </div>
              <div id="lessonPreviewBox" class="admin-lesson-preview-box"></div>
              <p class="admin-hint admin-lesson-preview-uploader__hint">
                Рекомендуемый формат: JPG или PNG, соотношение сторон 4:3.<br>
                Оптимальный размер: 1600×1200 px.<br>
                Можно загружать только JPG, PNG или WEBP размером до 5 MB.
              </p>
              <div class="admin-lesson-preview-uploader__actions">
                <input id="lessonPreviewFileInput" type="file" accept="image/jpeg,image/png,image/webp" hidden />
                <button id="uploadLessonPreviewBtn" class="btn btn-primary" type="button">Загрузить превью</button>
                <button id="removeLessonPreviewBtn" class="admin-btn-ghost" type="button" hidden>Удалить превью</button>
              </div>
            </section>
          </section>

          <section class="admin-blocks">
            <div class="admin-blocks-header">
              <h3>Секции урока</h3>
              <button id="addBlockBtn" class="btn btn-primary" type="button">+ Добавить секцию</button>
            </div>

            <div id="blocksList" class="admin-blocks-list"></div>
          </section>
        </section>

        <aside class="admin-preview-column">
          <div class="admin-preview-sticky">
            <div class="admin-preview-header">
              <p class="admin-card__eyebrow">Предпросмотр для ученика</p>
              <h3>Мобильный вид урока</h3>
            </div>
            <div class="admin-phone-frame">
              <div id="previewContainer" class="admin-phone-screen"></div>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
